name: Sync Fork
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync upstream
        run: gh repo sync ${{ github.repository }} --source openclaw/openclaw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
